name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: buhta
          POSTGRES_USER: buhta
          POSTGRES_PASSWORD: buhta
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U buhta -d buhta"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://buhta:buhta@localhost:5433/buhta
      BETTER_AUTH_SECRET: ci-better-auth-secret-at-least-32-chars
      BETTER_AUTH_URL: http://localhost:3000
      WEB_ORIGIN: http://localhost:3001
      SEED_ADMIN_PASSWORD: Pass123!

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply database migrations
        run: pnpm --filter @buhta/api exec prisma migrate deploy

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Docs check
        run: pnpm docs:check

      - name: Build
        run: pnpm build
