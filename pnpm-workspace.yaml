packages:
  - apps/*
  - packages/*

overrides:
  "@hono/node-server": 1.19.14
  postcss: 8.5.15

allowBuilds:
  "@nestjs/core": true
  "@prisma/client": true
  "@prisma/engines": true
  argon2: true
  esbuild: true
  msgpackr-extract: false
  prisma: true
  sharp: true

minimumReleaseAgeExclude:
  - oxlint-plugin-react-doctor@0.5.1
  - react-doctor@0.5.1
